<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket — aqua planet</title>

  <!-- Pretendard (국문) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />
  <!-- Poppins + EB Garamond (영문) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,500&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/ticket.css" />

  <!-- Three.js importmap (ES module) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- ================================================================
       ████████████████████████  예매 페이지  ████████████████████████
       (Ticket Page — Figma node 1284:127 구현)
       · GNB / FOOTER 는 메인(index.html)과 동일한 .gnb / .footer 스타일 재사용
       · 독립 페이지이므로 .ticket-page 는 항상 표시(is-open)
  ================================================================ -->
  <div class="ticket-page is-open">
    
    <!-- 3D 로고 캔버스 -->
    <div class="logo3d-wrap" aria-hidden="true"></div>
    <div class="logo3d-text" aria-hidden="true"></div>
    <!-- logo3d.js가 첫 지점(hero)을 찾을 수 있도록 더미 섹션 추가.
         · glass 굴절 셰이더(logo3d.js)가 hero 의 <video> 를 굴절 배경으로 샘플링하므로
           메인과 동일한 hero 비디오를 함께 둬야 3D 로고가 정상 렌더된다(footer 안착 포함).
         · 화면엔 안 보이지만 디코딩은 되도록 visibility:hidden 대신 video 에 opacity:0 사용. -->
    <div id="sec-logo" style="position: absolute; top: -1000px; width: 100%; height: 1px;" aria-hidden="true">
      <video class="section__video-bg" autoplay muted loop playsinline preload="auto" aria-hidden="true"
             style="position:absolute; width:2px; height:2px; opacity:0; pointer-events:none;">
        <source src="assets/images/first.mp4" type="video/mp4">
      </video>
      <h1 class="hero__title" style="display:none;">aqua planet</h1>
    </div>

    <header id="gnb" class="gnb">
      <div class="gnb__inner">
        <nav class="gnb__nav" aria-label="메인 메뉴">
          <div class="gnb__nav-item">
            <a href="program.html" class="gnb__link" data-nav="program">Program</a>
            <div class="gnb__dropdown">
              <a href="program.html?loc=Jeju"     class="gnb__dropdown-item">Jeju</a>
              <a href="program.html?loc=Yeosu"    class="gnb__dropdown-item">Yeosu</a>
              <a href="program.html?loc=Ilsan"    class="gnb__dropdown-item">Ilsan</a>
              <a href="program.html?loc=Gwanggyo" class="gnb__dropdown-item">Gwanggyo</a>
            </div>
          </div>
          <a href="Oceanfriends.html" class="gnb__link" data-nav="crew">Ocean friends</a>
          <div class="gnb__nav-item" data-nav="about">
            <span class="gnb__link">About us</span>
            <div class="gnb__dropdown">
              <a href="business.html" class="gnb__dropdown-item">Business</a>
              <a href="marinlab.html" class="gnb__dropdown-item">Marin Lab</a>
              <a href="location.html" class="gnb__dropdown-item">Location</a>
            </div>
          </div>
        </nav>

        <a href="index.html" class="gnb__logo-wrap" aria-label="Aqua Planet 홈">
          <img class="gnb__logo" src="assets/images/headerLogo.png" alt="" aria-hidden="true">
        </a>

        <a href="ticket.html" class="gnb__ticket btn-pill" aria-label="티켓 예매">
          Ticket
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 17L17 7M17 7H7M17 7V17" stroke="white" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </header>

    <!-- 배경 그라데이션 레이어 — 스크롤 콘텐츠 전체를 감싸 모든 브라우저(iOS local 버그 포함)에서 정상 렌더 -->
    <div class="ticket-bg">
<!--------------------------------------- 티켓구매페이지 - 지점별 ---------------------------------------------->
    <main class="ticket-main">
      <section class="ticket" aria-label="티켓 예매">

        <div  id="light-rays"></div>

        <h1 class="ticket__title">Ticket</h1>
        <p class="ticket__sub">다양한 할인정보를 확인하고 예매하세요</p>

        <!-- 떠다니는 장식 거품
             · --x  : 가로 위치(선택 후에도 동일) / --y : 세로 시작점 / --s : 지름 / --d : 초기 둥둥 주기
             · 선택하면 크기(--s) 순으로 큰 거품은 터지고(is-bursting), 지름 120px 1개는 빈 슬롯을
               채우며(is-survivor), 나머지 '작은 거품'만 위로 떠올라 옆에서 둥둥(is-floating) 한다.
             · ★ 떠다니는(작은) 거품의 '고정 위치'는 아래처럼 --ty(목표 top, vh) 를 주면 된다.
               (--ty 없으면 상단 6~22% 랜덤. --ty 는 작은 거품에만 적용되고 큰 거품은 무시됨) -->
        <div class="ticket__decor" aria-hidden="true">
          <!-- 큰 거품(터짐/생존) — --ty 불필요 -->
          <span class="deco-bubble" style="--x:10%; --y:22%; --s:65px;  --d:7s;"></span>
          <span class="deco-bubble" style="--x:20%; --y:26%; --s:120px; --d:8s;"></span>
          <span class="deco-bubble" style="--x:33%; --y:75%; --s:80px;  --d:10s;"></span>
          <span class="deco-bubble" style="--x:50%; --y:52%; --s:100px; --d:12s;"></span>
          <span class="deco-bubble" style="--x:63%; --y:26%; --s:130px; --d:9s;"></span>
          <span class="deco-bubble" style="--x:88%; --y:52%; --s:100px; --d:10.5s;"></span>
          <span class="deco-bubble" style="--x:75%; --y:82%; --s:110px; --d:7s;"></span>
          <!-- 작은 거품(떠다니는 장식) — --ty 로 최종 세로 위치 고정 -->
          <span class="deco-bubble" style="--x:13%; --y:18%; --s:20px; --d:9s;   --ty:11;"></span>
          <span class="deco-bubble" style="--x:10%; --y:75%; --s:40px; --d:11s;  --ty:16;"></span>
          <span class="deco-bubble" style="--x:36%; --y:18%; --s:50px; --d:6.5s; --ty:22;"></span>
          <span class="deco-bubble" style="--x:49%; --y:72%; --s:50px; --d:7.5s; --ty:18;"></span>
          <span class="deco-bubble" style="--x:88%; --y:23%; --s:55px; --d:7.5s; --ty:10;"></span>
          <span class="deco-bubble" style="--x:84%; --y:60%; --s:35px; --d:10.5s; --ty:18;"></span>
          <span class="deco-bubble" style="--x:25%; --y:38%; --s:40px; --d:8s;   --ty:14;"></span>
        </div>

        <!-- 지점 버블 + 예매 패널을 함께 중앙 정렬하는 무대 -->
        <div class="ticket-stage">

        <!-- 지점 버블 4곳 -->
        <div class="wrap">
          <a class="ticket-spot ticket-spot--ilsan" href="index.html#sec-booking" data-price="25,000₩" aria-label="아쿠아플라넷 일산 예매">
            <span class="ticket-spot__inner" style="--float:8s">
              <img class="ticket-spot__bubble" src="assets/images/ticket-bubble.png" alt="" aria-hidden="true">
              <img class="ticket-spot__animal" src="assets/images/ticket-ilsan.png" alt="바다코끼리">
              <span class="ticket-spot__label">Ilsan</span>
            </span>
          </a>

          <a class="ticket-spot ticket-spot--yeosu" href="index.html#sec-booking" data-price="31,000₩" aria-label="아쿠아플라넷 여수 예매">
            <span class="ticket-spot__inner" style="--float:9.5s">
              <img class="ticket-spot__bubble" src="assets/images/ticket-bubble.png" alt="" aria-hidden="true">
              <img class="ticket-spot__animal" src="assets/images/ticket-yeosu.png" alt="벨루가">
              <span class="ticket-spot__label">Yeosu</span>
            </span>
          </a>

          <a class="ticket-spot ticket-spot--jeju" href="index.html#sec-booking" data-price="37,600₩" aria-label="아쿠아플라넷 제주 예매">
            <span class="ticket-spot__inner" style="--float:7s">
              <img class="ticket-spot__bubble" src="assets/images/ticket-bubble.png" alt="" aria-hidden="true">
              <img class="ticket-spot__animal" src="assets/images/ticket-jeju.png" alt="고래상어">
              <span class="ticket-spot__label">Jeju</span>
            </span>
          </a>

          <a class="ticket-spot ticket-spot--gwanggyo" href="index.html#sec-booking" data-price="24,000₩" aria-label="아쿠아플라넷 광교 예매">
            <span class="ticket-spot__inner" style="--float:10.5s">
              <img class="ticket-spot__bubble" src="assets/images/ticket-bubble.png" alt="" aria-hidden="true">
              <img class="ticket-spot__animal" src="assets/images/ticket-gwanggyo.png" alt="펭귄">
              <span class="ticket-spot__label">Gwanggyo</span>
            </span>
          </a>
        </div>

        <!-- 지점 선택 시 나타나는 가격 / 할인 패널 -->
        <aside class="ticket-booking" aria-hidden="true">
          <p class="ticket-booking__price">Price <span>|&nbsp;<strong data-price-target>24,000₩</strong></span></p>

          <div class="ticket-booking__panel">
            <h2 class="ticket-booking__title">Discont</h2>

            <!-- 할인 아코디언 — 선택한 지점에 따라 ticket.js 가 내용을 채움 -->
            <div class="ticket-discount-list"></div>

            <button class="ticket-booking__btn" type="button">예매하기</button>
          </div>
        </aside>

        </div><!-- /.ticket-stage -->

      </section>
    </main>

    <!-- =========================================================
         스크롤 다운 구역 — 흰색 → #22B2EA 그라데이션
         (티켓 섹션 하단 흰색 그라데이션과 자연스럽게 이어짐)
         로고 영역은 추후 main 페이지 업데이트 시 추가 예정
    ========================================================== -->
    <section class="ticket-scroll-below" aria-label="하단 영역">
      <!-- 로고: 추후 추가 -->
      <div class="ticket-scroll-below__logo-placeholder" aria-hidden="true"></div>
    </section>

    <!-- FOOTER — 메인과 동일 (내용 업데이트) -->
    <!-- ================================================
      FOOTER
  ================================================ -->
  <footer id="footer" class="footer">
    <video class="footer__video-bg" autoplay muted loop playsinline aria-hidden="true">
      <source src="assets/images/KakaoTalk_Video_2026-06-13-21-54-21.mp4" type="video/mp4">
    </video>
    <div class="footer__inner">
      <nav class="footer__nav" aria-label="푸터 메뉴">
        <a href="program.html" class="footer__link">Program</a>
        <a href="Oceanfriends.html" class="footer__link">Ocean friends</a>
        <a href="location.html" class="footer__link">About us</a>
        <a href="location.html" class="footer__link">Location</a>
        <a href="ticket.html" class="footer__link">Ticket</a>
      </nav>

      <div class="footer__brand">
        <div class="footer__socials" aria-label="소셜 링크">
          <a href="https://www.instagram.com/aquaplanet_official" class="footer__social" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="4" width="16" height="16" rx="5"></rect>
              <circle cx="12" cy="12" r="3.4"></circle>
              <circle cx="17.2" cy="6.8" r="1"></circle>
            </svg>
          </a>
          <a href="https://www.youtube.com/@aquaplanetstory" class="footer__social" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5.2 7.2C5.6 6.5 6.3 6 7.1 5.9C8.4 5.7 10.5 5.6 12 5.6C13.5 5.6 15.6 5.7 16.9 5.9C17.7 6 18.4 6.5 18.8 7.2C19.2 8.1 19.4 10.2 19.4 12C19.4 13.8 19.2 15.9 18.8 16.8C18.4 17.5 17.7 18 16.9 18.1C15.6 18.3 13.5 18.4 12 18.4C10.5 18.4 8.4 18.3 7.1 18.1C6.3 18 5.6 17.5 5.2 16.8C4.8 15.9 4.6 13.8 4.6 12C4.6 10.2 4.8 8.1 5.2 7.2Z"></path>
              <path d="M10.4 9.3L14.7 12L10.4 14.7V9.3Z" class="footer__social-play"></path>
            </svg>
          </a>
          <a href="https://www.aquaplanet.co.kr/index.html" class="footer__social" target="_blank" rel="noopener noreferrer" aria-label="Google">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19.6 12.2C19.6 11.6 19.5 11.1 19.4 10.6H12.2V13.5H16.3C16.1 14.5 15.5 15.3 14.7 15.8V17.7H17.2C18.7 16.4 19.6 14.5 19.6 12.2Z"></path>
              <path d="M12.2 19.7C14.3 19.7 16.1 19 17.2 17.7L14.7 15.8C14 16.3 13.1 16.6 12.2 16.6C10.2 16.6 8.5 15.2 7.9 13.4H5.3V15.3C6.5 17.9 9.1 19.7 12.2 19.7Z"></path>
              <path d="M7.9 13.4C7.7 12.9 7.6 12.5 7.6 12C7.6 11.5 7.7 11.1 7.9 10.6V8.7H5.3C4.8 9.7 4.5 10.8 4.5 12C4.5 13.2 4.8 14.3 5.3 15.3L7.9 13.4Z"></path>
              <path d="M12.2 7.4C13.3 7.4 14.4 7.8 15.2 8.6L17.3 6.5C16 5.3 14.3 4.6 12.2 4.6C9.1 4.6 6.5 6.3 5.3 8.7L7.9 10.6C8.5 8.8 10.2 7.4 12.2 7.4Z"></path>
            </svg>
          </a>
        </div>
        <p class="footer__copy">Aqua Planet. ©2026 All rights reserved.</p>
      </div>
    </div>
  </footer>

    </div><!-- /.ticket-bg -->

  </div><!-- /.ticket-page -->

  <!-- 커스텀 커서 (index.html 과 동일) -->
  <div id="custom-cursor" aria-hidden="true"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/gnb-scroll.js"></script>
  <script type="module" src="js/ticket.js"></script>
  <script type="module" src="js/logo3d.js"></script>
</body>
</html>
